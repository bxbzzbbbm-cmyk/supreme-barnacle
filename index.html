<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CPU Core Checker</title>
<style>
  body {
    font-family: Arial;
    background: #111;
    color: #00ffcc;
    text-align: center;
    padding-top: 80px;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }

  .box {
    margin-top: 30px;
    font-size: 22px;
  }
</style>
</head>
<body>

<h1>CPU Core Checker</h1>

<button onclick="getCPU()">Get CPU Cores</button>

<div class="box" id="output">Waiting...</div>

<script>
async function getCPU() {
  try {
    const res = await fetch("./api/get-cpu.json");
    const data = await res.json();

    let cores = data.cpu_cores;

    document.getElementById("output").innerHTML =
      "Detected CPU Cores: " + cores + " cores";

  } catch (err) {
    document.getElementById("output").innerText =
      "Failed to load CPU data";
  }
}
</script>

</body>
</html>
